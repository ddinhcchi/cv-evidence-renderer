name: Release to PyPI

on:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-publish:
    name: Build sdist + wheel, upload to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # No id-token: write — we authenticate with PYPI_API_TOKEN secret
      # instead of trusted publishing for now. Migrate to trusted publishing
      # once the project exists on PyPI (cleaner, no rotating tokens).
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import importlib.metadata, tomllib; \
            print(tomllib.loads(open('pyproject.toml').read())['project']['version'])")
          echo "Tag:     $TAG_VERSION"
          echo "Package: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Twine check (metadata sanity)
        run: python -m twine check dist/*

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload --non-interactive --skip-existing dist/*
